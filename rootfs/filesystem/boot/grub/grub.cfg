set default=0
set timeout=5

set gfxmode=1024x768,auto
terminal_output gfxterm

set menu_color_normal=light-gray/black
set menu_color_highlight=white/light-red

menuentry "Redrose Linux" {
    echo "Loading linux from /boot/vmlinuz-6.19.2"
    linux /boot/vmlinuz-6.19.2 loglevel=1 root=/dev/sda3 rw nomodeset
    initrd /boot/initrd.img
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
