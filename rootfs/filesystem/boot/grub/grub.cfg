set default=0
set timeout=5

set gfxmode=1024x768,auto
terminal_output gfxterm

set menu_color_normal=light-gray/black
set menu_color_highlight=light-gray/light-red

menuentry "Redrose Linux" {
    linux /boot/linuxImage loglevel=1 init=/init nomodeset
    initrd /boot/initramfs_rootfs.cpio.gz
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}

