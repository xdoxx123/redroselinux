set default=0
set timeout=5

set gfxmode=auto
set menu_color_normal=light-gray/black
set menu_color_highlight=white/light-red

menuentry "→ Install Redrose Linux" --class redrose --class gnu-linux --class os {
    echo "Loading kernel from /boot/linuxImage"
    linux /boot/linuxImage loglevel=1 nomodeset
    echo "Loading initramfs from /boot/initramfs.cpio.gz"
    initrd /boot/initramfs.cpio.gz
    clear
}

menuentry "→ Important Information" --class info {
    echo ""
    echo "Redrose Linux Installer"
    echo ""
    echo "? This is an ALPHA build."
    echo "  Do NOT install it on your main machine."
    echo ""
    echo "? The installer boots quickly and uses a simple TUI."
    echo ""
    echo "? Default boot options:"
    echo "  - loglevel=1 (minimal boot logs)"
    echo "  - nomodeset  (safe graphics mode)"
    echo ""
    echo "• Need more logs?"
    echo "  Highlight the install entry, press 'e', and remove loglevel=1."
    echo ""
    echo "Press any key to return to the menu..."
    read
}

menuentry "← Boot existing OS" --class os {
    exit
}

menuentry "↓ Reboot" --class reboot {
    reboot
}

menuentry "↓ Shutdown" --class shutdown {
    halt
}
